<svg width="800" height="600" xmlns="http://www.w3.org/2000/svg">
  <!-- 背景渐变 -->
  <defs>
    <linearGradient id="leftGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="rightGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f093fb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f5576c;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- 左边（曾沛慈） -->
  <rect width="400" height="600" fill="url(#leftGrad)"/>
  <text x="200" y="200" font-size="60" fill="white" text-anchor="middle" font-weight="bold">🎤</text>
  <text x="200" y="280" font-size="36" fill="white" text-anchor="middle" font-weight="bold">曾沛慈</text>
  <text x="200" y="320" font-size="20" fill="white" text-anchor="middle" opacity="0.9">Cessa Tsang</text>
  <text x="200" y="380" font-size="18" fill="#ffff00" text-anchor="middle" font-weight="bold">✨ 歌手</text>
  
  <!-- 右边（邓紫棋） -->
  <rect x="400" width="400" height="600" fill="url(#rightGrad)"/>
  <text x="600" y="200" font-size="60" fill="white" text-anchor="middle" font-weight="bold">🎵</text>
  <text x="600" y="280" font-size="36" fill="white" text-anchor="middle" font-weight="bold">邓紫棋</text>
  <text x="600" y="320" font-size="20" fill="white" text-anchor="middle" opacity="0.9">Deng Ziqi</text>
  <text x="600" y="380" font-size="18" fill="#ffff00" text-anchor="middle" font-weight="bold">✨ 歌手</text>
  
  <!-- 中间分割线 -->
  <line x1="400" y1="150" x2="400" y2="450" stroke="white" stroke-width="2" opacity="0.3"/>
  
  <!-- 中间合唱标志 -->
  <rect x="320" y="270" width="160" height="60" rx="30" fill="rgba(0,0,0,0.4)" stroke="white" stroke-width="2"/>
  <text x="400" y="310" font-size="28" fill="white" text-anchor="middle" font-weight="bold">♫ 合唱 ♫</text>
</svg>