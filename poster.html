<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>曾沛慈 × 邓紫棋 合唱海报</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: 'Arial', sans-serif;
        }
        
        .container {
            width: 800px;
            height: 600px;
            background: linear-gradient(135deg, #1e1e2e 0%, #2d2d44 100%);
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            display: flex;
            position: relative;
        }
        
        .left {
            flex: 1;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            padding: 30px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }
        
        .left::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.1) 1px, transparent 1px);
            background-size: 20px 20px;
            animation: float 20s linear infinite;
        }
        
        @keyframes float {
            0% { transform: translate(0, 0); }
            100% { transform: translate(20px, 20px); }
        }
        
        .right {
            flex: 1;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            padding: 30px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }
        
        .right::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.1) 1px, transparent 1px);
            background-size: 20px 20px;
            animation: float 20s linear infinite reverse;
        }
        
        .content {
            position: relative;
            z-index: 2;
        }
        
        .name {
            font-size: 32px;
            font-weight: bold;
            margin-bottom: 10px;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.3);
        }
        
        .title {
            font-size: 18px;
            opacity: 0.9;
            margin-bottom: 20px;
        }
        
        .emoji {
            font-size: 60px;
            margin: 20px 0;
            animation: bounce 2s infinite;
        }
        
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        
        .divider {
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            width: 3px;
            height: 200px;
            background: white;
            opacity: 0.3;
            z-index: 3;
        }
        
        .center-text {
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            font-size: 24px;
            color: white;
            font-weight: bold;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.5);
            z-index: 4;
            background: rgba(0, 0, 0, 0.3);
            padding: 10px 20px;
            border-radius: 50px;
            white-space: nowrap;
        }
        
        .highlight {
            font-size: 24px;
            color: #ffff00;
            font-weight: bold;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="left">
            <div class="content">
                <div class="emoji">🎤</div>
                <div class="name">曾沛慈</div>
                <div class="title">Cessa Tsang</div>
                <div class="highlight">✨ 歌手</div>
            </div>
        </div>
        
        <div class="divider"></div>
        <div class="center-text">♫ 合 唱 ♫</div>
        
        <div class="right">
            <div class="content">
                <div class="emoji">🎵</div>
                <div class="name">邓紫棋</div>
                <div class="title">Deng Ziqi</div>
                <div class="highlight">✨ 歌手</div>
            </div>
        </div>
    </div>
    
    <script>
        // 页面加载后，自动将画布转换为图片
        window.addEventListener('load', () => {
            setTimeout(() => {
                html2canvas(document.querySelector('.container')).then(canvas => {
                    // 生成图片
                    const imgData = canvas.toDataURL('image/png');
                    console.log('图片生成完成:', imgData.substring(0, 50) + '...');
                });
            }, 500);
        });
    </script>
</body>
</html>
